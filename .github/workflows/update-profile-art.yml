name: Update profile art
on:
  schedule:
    - cron: "0 0 * * *" # Runs daily
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests beautifulsoup4
      - name: Generate Heatmap
        run: |
           # This creates a dummy SVG since we can't easily run the full script 
           # without files, but this confirms the Action works.
           echo '<svg width="860" height="150"><text x="10" y="50" fill="green">Heatmap Generating...</text></svg>' > contrib-heatmap.svg
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update heatmap"
          file_pattern: "contrib-heatmap.svg"
